services:
  - type: web
    name: metrosphere-backend
    env: python
    region: singapore
    plan: free
    buildCommand: pip install -r requirements.txt && python ml/train_model.py
    startCommand: gunicorn app:app --workers 2 --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: GROQ_API_KEY
        sync: false
      - key: PYTHON_VERSION
        value: 3.12.0
